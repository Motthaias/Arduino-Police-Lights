<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RPLL ATC Monitor</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #0b0e14;
            color: #e1e1e1;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        header {
            background-color: #161b22;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #30363d;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo svg {
            width: 24px;
            height: 24px;
            fill: #58a6ff;
        }

        .logo h1 {
            font-size: 1.25rem;
            font-weight: 600;
        }

        .status-bar {
            display: flex;
            gap: 20px;
            font-size: 0.9rem;
            color: #8b949e;
        }

        .status-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .status-item svg {
            width: 14px;
            height: 14px;
            fill: #8b949e;
        }

        .dashboard {
            display: grid;
            grid-template-columns: 2.5fr 1fr;
            gap: 20px;
            padding: 20px;
            flex: 1;
        }

        @media (max-width: 1200px) {
            .dashboard {
                grid-template-columns: 1fr;
            }
        }

        .panel {
            background-color: #161b22;
            border: 1px solid #30363d;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .panel-header {
            background-color: #21262d;
            padding: 10px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #30363d;
        }

        .panel-header h2 {
            font-size: 1rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .panel-header svg {
            width: 16px;
            height: 16px;
            fill: #e1e1e1;
        }

        .panel-actions a {
            color: #8b949e;
            text-decoration: none;
            transition: color 0.2s;
            display: flex;
            align-items: center;
        }

        .panel-actions svg {
            width: 14px;
            height: 14px;
            fill: currentColor;
        }

        .panel-actions a:hover {
            color: #58a6ff;
        }

        .panel-content {
            flex: 1;
            min-height: 600px;
            display: flex;
        }

        .panel-content iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .radio-content {
            flex-direction: column;
            padding: 20px;
            background-color: #0d1117;
        }

        .stream-info {
            text-align: center;
            padding: 25px;
            border: 1px solid #30363d;
            background-color: #161b22;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .stream-info p {
            margin-bottom: 20px;
            color: #c9d1d9;
            font-weight: 500;
        }

        .audio-player-container {
            margin: 20px 0;
            padding: 15px;
            background-color: #0d1117;
            border-radius: 12px;
            border: 1px solid #30363d;
        }

        audio {
            width: 100%;
            height: 40px;
            filter: invert(100%) hue-rotate(180deg) brightness(1.5);
        }

        .stream-status {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 0.85rem;
            color: #8b949e;
            margin-top: 15px;
        }

        .status-indicator {
            width: 10px;
            height: 10px;
            background-color: #238636;
            border-radius: 50%;
            display: inline-block;
            box-shadow: 0 0 8px #238636;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.1); }
            100% { opacity: 1; transform: scale(1); }
        }

        .stream-info .note {
            font-size: 0.8rem;
            color: #8b949e;
            font-style: italic;
            margin-top: 20px;
            line-height: 1.4;
        }

        .external-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-top: 15px;
            color: #58a6ff;
            text-decoration: none;
            font-size: 0.9rem;
        }

        .external-link svg {
            width: 12px;
            height: 12px;
            fill: currentColor;
        }

        .external-link:hover {
            text-decoration: underline;
        }

        footer {
            padding: 1rem;
            text-align: center;
            background-color: #161b22;
            border-top: 1px solid #30363d;
            font-size: 0.8rem;
            color: #8b949e;
        }

        footer a {
            color: #58a6ff;
            text-decoration: none;
        }

        footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">
            <svg viewBox="0 0 512 512"><path d="M448 336v-40L288 192V72c0-39.8-32.2-72-72-72s-72 32.2-72 72v120L0 296v40l144-48v112l-32 24v40l80-24 80 24v-40l-32-24V288l144 48z"/></svg>
            <h1>RPLL Manila ATC Monitor</h1>
        </div>
        <div class="status-bar">
            <span class="status-item">
                <svg viewBox="0 0 512 512"><path d="M256 8C119 8 8 119 8 256s111 248 248 248 248-111 248-248S393 8 256 8zm0 448c-110.5 0-200-89.5-200-200S145.5 56 256 56s200 89.5 200 200-89.5 200-200 200zm61.8-104.4l-84.9-62.9V112c0-13.3-10.7-24-24-24s-24 10.7-24 24v176c0 9.2 5.2 17.6 13.3 21.6l104 56c11.9 6.4 26.9 1.9 33.3-10 6.4-11.9 1.9-26.9-10-33.3l.3-.1z"/></svg>
                <span id="current-time"></span> UTC
            </span>
            <span class="status-item">
                <svg viewBox="0 0 384 512"><path d="M172.268 501.67C26.97 291.031 0 269.413 0 192 0 85.961 85.961 0 192 0s192 85.961 192 192c0 77.413-26.97 99.031-172.268 309.67-9.535 13.774-29.93 13.773-39.464 0zM192 272c44.183 0 80-35.817 80-80s-35.817-80-80-80-80 35.817-80 80 35.817 80 80 80z"/></svg>
                Ninoy Aquino Int'l
            </span>
        </div>
    </header>

    <main class="dashboard">
        <section class="panel map-panel">
            <div class="panel-header">
                <h2><svg viewBox="0 0 576 512"><path d="M0 117.66v346.32c0 11.32 11.43 19.06 21.94 14.86L160 416V32L21.94 87.22C11.43 91.42 0 99.16 0 110.48zm224-85.66v384l128 64V96l-128-64zm352 128.22L416 96v384l138.06 55.22c10.51 4.2 21.94-3.54 21.94-14.86V152.48c0-11.32-11.43-19.06-21.94-14.86z"/></svg> Active Map Monitoring</h2>
                <div class="panel-actions">
                    <a href="https://www.flightaware.com/live/airport/RPLL" target="_blank" title="Open in FlightAware">
                        <svg viewBox="0 0 512 512"><path d="M432 288v144H80V128h144V80H80c-26.5 0-48 21.5-48 48v304c0 26.5 21.5 48 48 48h352c26.5 0 48-21.5 48-48V288h-48zm-112-256v48h82.7L181.3 301.3l33.4 33.4L436 113.3V196h48V32H320z"/></svg>
                    </a>
                </div>
            </div>
            <div class="panel-content">
                <iframe src="https://globe.adsbexchange.com/?airport=RPLL&lat=14.508&lon=121.019&zoom=12" frameborder="0"></iframe>
            </div>
        </section>

        <section class="panel radio-panel">
            <div class="panel-header">
                <h2><svg viewBox="0 0 448 512"><path d="M400 32H48C21.5 32 0 53.5 0 80v352c0 26.5 21.5 48 48 48h352c26.5 0 48-21.5 48-48V80c0-26.5-21.5-48-48-48zm-176 368c-44.1 0-80-35.9-80-80s35.9-80 80-80 80 35.9 80 80-35.9 80-80 80zm128-144c-13.3 0-24-10.7-24-24s10.7-24 24-24 24 10.7 24 24-10.7 24-24 24zm-256 0c-13.3 0-24-10.7-24-24s10.7-24 24-24 24 10.7 24 24-10.7 24-24 24zm128-112c-44.1 0-80-35.9-80-80s35.9-80 80-80 80 35.9 80 80-35.9 80-80 80z"/></svg> Radio Conversation</h2>
                <div class="panel-actions">
                    <a href="https://www.liveatc.net/hlisten.php?mount=rpll&icao=rpll" target="_blank" title="Open in LiveATC">
                        <svg viewBox="0 0 512 512"><path d="M432 288v144H80V128h144V80H80c-26.5 0-48 21.5-48 48v304c0 26.5 21.5 48 48 48h352c26.5 0 48-21.5 48-48V288h-48zm-112-256v48h82.7L181.3 301.3l33.4 33.4L436 113.3V196h48V32H320z"/></svg>
                    </a>
                </div>
            </div>
            <div class="panel-content radio-content">
                <div class="stream-info">
                    <p>RPLL Tower/Ground Audio Feed</p>

                    <div class="audio-player-container">
                        <audio controls preload="none">
                            <source src="https://s1-fmt2.liveatc.net/rpll" type="audio/mpeg">
                            <source src="http://feed.liveatc.net/rpll" type="audio/mpeg">
                            Your browser does not support the audio element.
                        </audio>
                    </div>

                    <div class="stream-status">
                        <span class="status-indicator"></span>
                        LIVE STREAM
                    </div>

                    <p class="note">
                        Direct audio monitoring of Ninoy Aquino International Airport (RPLL) operations.
                    </p>

                    <a href="https://www.liveatc.net/hlisten.php?mount=rpll&icao=rpll" target="_blank" class="external-link">
                        <svg viewBox="0 0 512 512"><path d="M432 288v144H80V128h144V80H80c-26.5 0-48 21.5-48 48v304c0 26.5 21.5 48 48 48h352c26.5 0 48-21.5 48-48V288h-48zm-112-256v48h82.7L181.3 301.3l33.4 33.4L436 113.3V196h48V32H320z"/></svg>
                        Open in LiveATC
                    </a>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <p>Data provided by <a href="https://www.flightaware.com" target="_blank">FlightAware</a> and <a href="https://www.liveatc.net" target="_blank">LiveATC</a></p>
    </footer>

    <script>
        function updateTime() {
            const now = new Date();
            const utc = now.toISOString().split('T')[1].split('.')[0];
            document.getElementById('current-time').textContent = utc;
        }
        setInterval(updateTime, 1000);
        updateTime();
    </script>
</body>
</html>
