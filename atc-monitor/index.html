<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RPLL ATC Monitor</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #0b0e14;
            color: #e1e1e1;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        header {
            background-color: #161b22;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #30363d;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo i {
            font-size: 1.5rem;
            color: #58a6ff;
        }

        .logo h1 {
            font-size: 1.25rem;
            font-weight: 600;
        }

        .status-bar {
            display: flex;
            gap: 20px;
            font-size: 0.9rem;
            color: #8b949e;
        }

        .status-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .dashboard {
            display: grid;
            grid-template-columns: 2.5fr 1fr;
            gap: 20px;
            padding: 20px;
            flex: 1;
        }

        @media (max-width: 1200px) {
            .dashboard {
                grid-template-columns: 1fr;
            }
        }

        .panel {
            background-color: #161b22;
            border: 1px solid #30363d;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .panel-header {
            background-color: #21262d;
            padding: 10px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #30363d;
        }

        .panel-header h2 {
            font-size: 1rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .panel-actions a {
            color: #8b949e;
            text-decoration: none;
            transition: color 0.2s;
        }

        .panel-actions a:hover {
            color: #58a6ff;
        }

        .panel-content {
            flex: 1;
            min-height: 600px;
            display: flex;
        }

        .panel-content iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .radio-content {
            flex-direction: column;
            padding: 20px;
            background-color: #0d1117;
        }

        .stream-info {
            text-align: center;
            padding: 20px;
            border: 1px dashed #30363d;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .stream-info p {
            margin-bottom: 15px;
            color: #8b949e;
        }

        .stream-info .note {
            font-size: 0.8rem;
            font-style: italic;
            margin-top: 15px;
        }

        .btn {
            display: inline-block;
            background-color: #238636;
            color: white;
            padding: 10px 20px;
            border-radius: 6px;
            text-decoration: none;
            font-weight: 600;
            transition: background-color 0.2s;
        }

        .btn:hover {
            background-color: #2ea043;
        }

        footer {
            padding: 1rem;
            text-align: center;
            background-color: #161b22;
            border-top: 1px solid #30363d;
            font-size: 0.8rem;
            color: #8b949e;
        }

        footer a {
            color: #58a6ff;
            text-decoration: none;
        }

        footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">
            <i class="fa-solid fa-plane-arrival"></i>
            <h1>RPLL Manila ATC Monitor</h1>
        </div>
        <div class="status-bar">
            <span class="status-item"><i class="fa-solid fa-clock"></i> <span id="current-time"></span> UTC</span>
            <span class="status-item"><i class="fa-solid fa-location-dot"></i> Ninoy Aquino Int'l</span>
        </div>
    </header>

    <main class="dashboard">
        <section class="panel map-panel">
            <div class="panel-header">
                <h2><i class="fa-solid fa-map"></i> Active Map Monitoring</h2>
                <div class="panel-actions">
                    <a href="https://www.flightaware.com/live/airport/RPLL" target="_blank" title="Open in FlightAware"><i class="fa-solid fa-up-right-from-square"></i></a>
                </div>
            </div>
            <div class="panel-content">
                <iframe src="https://embed.flightaware.com/commercial/integrated/web/delay_map_fullpage.rvt?airport=RPLL" frameborder="0"></iframe>
            </div>
        </section>

        <section class="panel radio-panel">
            <div class="panel-header">
                <h2><i class="fa-solid fa-tower-broadcast"></i> Radio Conversation</h2>
                <div class="panel-actions">
                    <a href="https://www.liveatc.net/hlisten.php?mount=rpll&icao=rpll" target="_blank" title="Open in LiveATC"><i class="fa-solid fa-up-right-from-square"></i></a>
                </div>
            </div>
            <div class="panel-content radio-content">
                <div class="stream-info">
                    <p>Live feed from RPLL Tower/Ground</p>
                    <div class="controls">
                        <a href="https://www.liveatc.net/hlisten.php?mount=rpll&icao=rpll" target="_blank" class="btn">
                            <i class="fa-solid fa-play"></i> Open Radio Feed
                        </a>
                    </div>
                    <p class="note">Note: LiveATC feeds may require opening in a separate window due to security restrictions.</p>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <p>Data provided by <a href="https://www.flightaware.com" target="_blank">FlightAware</a> and <a href="https://www.liveatc.net" target="_blank">LiveATC</a></p>
    </footer>

    <script>
        function updateTime() {
            const now = new Date();
            const utc = now.toISOString().split('T')[1].split('.')[0];
            document.getElementById('current-time').textContent = utc;
        }
        setInterval(updateTime, 1000);
        updateTime();
    </script>
</body>
</html>
